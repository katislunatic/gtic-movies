<style>
:root {
  --bg: #0b0b0d;
  --card: #141417;
  --muted: #a0a0a8;
  --accent: #e50914;
  --accent-hover: #ff1f2a;
  --glass: rgba(255, 255, 255, 0.05);
  --border: rgba(255, 255, 255, 0.08);
  --radius: 16px;
  --max-width: 1200px;
  font-family: 'Inter', system-ui, -apple-system, sans-serif;
}

* { box-sizing: border-box; }
html, body { height: 100%; margin: 0; background-color: var(--bg); background-image: radial-gradient(at 0% 0%, rgba(229, 9, 20, 0.15) 0px, transparent 50%), radial-gradient(at 100% 0%, rgba(32, 50, 200, 0.05) 0px, transparent 50%); color: #ffffff; -webkit-font-smoothing: antialiased; overflow-x: hidden; }

/* Custom Scrollbar */
::-webkit-scrollbar { width: 8px; }
::-webkit-scrollbar-track { background: var(--bg); }
::-webkit-scrollbar-thumb { background: #333; border-radius: 10px; }
::-webkit-scrollbar-thumb:hover { background: #444; }

/* Overlays */
#passwordOverlay, #playerOverlay, #showOverlay, #vpnOverlay { position: fixed; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 9999; padding: 20px; }
#passwordOverlay { background: radial-gradient(circle at center, #1a1a1a 0%, #000 100%); }
#passwordOverlay.hidden { display: none; }
#vpnOverlay { background: rgba(0, 0, 0, 0.85); backdrop-filter: blur(8px); display: none; z-index: 10001; }
.vpn-card { background: var(--card); border: 1px solid var(--border); padding: 30px; border-radius: 20px; max-width: 450px; text-align: center; }
#introOverlay { position: fixed; inset: 0; background: black; display: flex; align-items: center; justify-content: center; z-index: 9998; }
#introOverlay.hidden { display: none; }
.introLogo { width: 280px; opacity: 0; animation: fadeInOut 2s forwards; }

@keyframes fadeInOut { 0% { opacity: 0; transform: scale(0.8); } 50% { opacity: 1; transform: scale(1); } 100% { opacity: 0; transform: scale(1.1); } }

/* Layout */
.wrap { max-width: var(--max-width); margin: 0 auto; padding: 40px 20px; display: none; }
header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 40px; }
.logo img { width: 60px; height: 60px; border-radius: 14px; object-fit: cover; }

/* Custom Selects */
.sticky-bar { position: sticky; top: 10px; z-index: 100; background: rgba(11, 11, 13, 0.8); backdrop-filter: blur(16px); padding: 15px; border-radius: 20px; border: 1px solid var(--border); margin-bottom: 30px; }
.controls { display: flex; gap: 12px; flex-wrap: wrap; align-items: center; }
.search { flex: 2; min-width: 250px; display: flex; align-items: center; gap: 10px; background: rgba(255,255,255,0.03); padding: 10px 16px; border-radius: 12px; border: 1px solid var(--border); }
.search input { background: transparent; border: 0; outline: 0; color: #fff; width: 100%; font-size: 14px; }

.custom-select { position: relative; min-width: 160px; flex: 1; }
.select-trigger { background: rgba(255,255,255,0.05); border: 1px solid var(--border); padding: 10px 16px; border-radius: 12px; cursor: pointer; display: flex; justify-content: space-between; align-items: center; font-size: 14px; font-weight: 600; transition: 0.3s; }
.select-trigger::after { content: '▼'; font-size: 10px; transition: 0.3s; color: var(--muted); }
.custom-select.open .select-trigger::after { transform: rotate(180deg); }
.options-menu { position: absolute; top: calc(100% + 8px); left: 0; right: 0; background: #1a1a1e; border: 1px solid var(--border); border-radius: 12px; overflow: hidden; z-index: 200; opacity: 0; transform: translateY(-10px); pointer-events: none; transition: 0.3s; }
.custom-select.open .options-menu { opacity: 1; transform: translateY(0); pointer-events: auto; }
.option { padding: 12px 16px; font-size: 14px; cursor: pointer; }
.option:hover { background: var(--accent); }

#sortBtn { background: rgba(255,255,255,0.05); border: 1px solid var(--border); color: white; padding: 10px 16px; border-radius: 12px; cursor: pointer; font-size: 14px; font-weight: 600; }

/* Tabs */
.tabs { display: flex; gap: 8px; margin: 0 auto 30px auto; background: var(--glass); padding: 6px; border-radius: 16px; width: 100%; max-width: 450px; position: relative; border: 1px solid var(--border); }
.tab-btn { flex: 1; padding: 12px 0; border: 0; background: transparent; color: var(--muted); font-size: 14px; font-weight: 700; cursor: pointer; text-align: center; transition: 0.3s; z-index: 2; }
.tab-btn.active { color: white; }
.tab-indicator { position: absolute; top: 6px; left: 6px; height: calc(100% - 12px); width: calc((100% - 12px - 16px) / 3); background: var(--accent); border-radius: 12px; transition: 0.4s cubic-bezier(0.19, 1, 0.22, 1); z-index: 1; }

/* Cards */
.movies { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 24px; }
.card { background: var(--card); border-radius: var(--radius); overflow: hidden; border: 1px solid var(--border); transition: 0.4s; }
.card:hover { transform: translateY(-10px); border-color: rgba(255,255,255,0.2); }
.poster { height: 180px; background: #1a1a1e; }
.poster img { width: 100%; height: 100%; object-fit: cover; }
.meta { padding: 20px; }
.rating { background: var(--accent); padding: 4px 8px; border-radius: 6px; font-size: 11px; font-weight: 800; }
.btn-watch { width: 100%; background: white; color: black; padding: 10px; border-radius: 10px; border: 0; cursor: pointer; font-weight: 700; margin-top: 10px; }

#playerOverlay iframe { width: 100%; max-width: 1000px; aspect-ratio: 16/9; border-radius: 16px; border: 0; }
#showOverlay { background: rgba(0,0,0,0.95); display: none; overflow-y: auto; }
</style>
</head>

function setupDropdown(id, callback) {
    const el = document.getElementById(id);
    const trigger = el.querySelector('.select-trigger');
    trigger.onclick = (e) => {
        e.stopPropagation();
        document.querySelectorAll('.custom-select').forEach(s => s !== el && s.classList.remove('open'));
        el.classList.toggle('open');
    };
    el.querySelectorAll('.option').forEach(opt => {
        opt.onclick = () => {
            trigger.textContent = opt.textContent;
            el.classList.remove('open');
            callback(opt.dataset.value);
        };
    });
}

function renderList(list) {
    container.innerHTML = "";
    list.forEach(m => {
        const card = document.createElement('article'); card.className = 'card';
        card.innerHTML = `<div class="poster"><img src="${m.img}"></div><div class="meta"><h3>${m.title}</h3><span class="rating">${m.rating}</span><button class="btn-watch">▶ Watch Now</button></div>`;
        card.querySelector('button').onclick = () => {
            if(currentTab === 'movies') { frame.src = m.link; overlayPlayer.style.display = 'flex'; }
            else if(currentTab === 'shows') openShow(m);
            else openSports(m);
        };
        container.append(card);
    });
}

function openShow(show) {
    showOverlay.innerHTML = `<button onclick="this.parentElement.style.display='none'" style="background:red; color:white; border:0; padding:10px; cursor:pointer; margin:20px;">Close</button><h2 style="text-align:center">${show.title}</h2>`;
    show.seasons.forEach(s => {
        const div = document.createElement('div');
        div.style.padding = "20px";
        div.innerHTML = `<h3>${s.title}</h3>`;
        s.episodes.forEach(e => {
            const b = document.createElement('button');
            b.style.margin = "5px"; b.textContent = e.title;
            b.onclick = () => { frame.src = e.link; overlayPlayer.style.display = 'flex'; };
            div.append(b);
        });
        showOverlay.append(div);
    });
    showOverlay.style.display = 'block';
}

function openSports(sport) {
    showOverlay.innerHTML = `<button onclick="this.parentElement.style.display='none'" style="background:red; color:white; border:0; padding:10px; cursor:pointer; margin:20px;">Close</button><h2 style="text-align:center">${sport.title}</h2>`;
    sport.events.forEach(ev => {
        const b = document.createElement('button');
        b.style.margin = "20px"; b.textContent = ev.title;
        b.onclick = () => { frame.src = ev.link; overlayPlayer.style.display = 'flex'; };
        showOverlay.append(b);
    });
    showOverlay.style.display = 'block';
}

function filterItems() {
    let list = currentTab === 'movies' ? movies : currentTab === 'shows' ? shows : sports;
    const query = document.getElementById('q').value.toLowerCase();
    let filtered = list.filter(m => 
        (m.title.toLowerCase().includes(query)) &&
        (activeRating === 'all' || m.rating === activeRating) &&
        (activeCat === 'all' || m.category === activeCat)
    );
    if(sortAZ) filtered.sort((a,b) => a.title.localeCompare(b.title));
    else filtered.sort((a,b) => b.title.localeCompare(a.title));
    renderList(filtered);
}

document.getElementById('q').oninput = filterItems;
document.getElementById('sortBtn').onclick = () => { sortAZ = !sortAZ; document.getElementById('sortBtn').textContent = sortAZ ? "Sort A-Z" : "Sort Z-A"; filterItems(); };

document.querySelectorAll('.tab-btn').forEach((t, idx) => {
    t.onclick = () => {
        document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
        t.classList.add('active'); 
        document.getElementById('indicator').style.transform = `translateX(calc(${idx * 100}% + ${idx * 8}px))`;
        currentTab = t.dataset.tab; filterItems();
    };
});

document.getElementById('pwBtn').onclick = () => {
    if(document.getElementById('pwInput').value === "GTICMOVIES6741") {
        document.getElementById('passwordOverlay').classList.add('hidden');
        document.getElementById('introOverlay').classList.remove('hidden');
        setTimeout(() => {
            document.getElementById('introOverlay').classList.add('hidden');
            document.getElementById('mainContent').style.display = 'block';
            document.getElementById('vpnOverlay').style.display = 'flex';
            filterItems();
        }, 2000);
    } else { alert("Access Denied"); }
};

document.getElementById('closeVpn').onclick = () => document.getElementById('vpnOverlay').style.display = 'none';
document.getElementById('closePlayer').onclick = () => { overlayPlayer.style.display = 'none'; frame.src = ""; };
document.getElementById('logoutBtn').onclick = () => location.reload();
</script>
</body>
</html>
