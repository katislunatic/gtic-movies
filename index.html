<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>GTIC Movie Hubs</title>

<link rel="icon" type="image/png" href="https://i.ibb.co/C3kwF5SC/gtic-logo.png" />

<style>
:root {
  --bg: #0b0b0d;
  --card: #141417;
  --muted: #a0a0a8;
  --accent: #e50914;
  --accent-hover: #ff1f2a;
  --glass: rgba(255, 255, 255, 0.05);
  --border: rgba(255, 255, 255, 0.08);
  --radius: 16px;
  --max-width: 1200px;
  font-family: 'Inter', system-ui, -apple-system, sans-serif;
}

* { box-sizing: border-box; }

html, body { 
    height: 100%; 
    margin: 0; 
    background-color: var(--bg);
    background-image: 
        radial-gradient(at 0% 0%, rgba(229, 9, 20, 0.15) 0px, transparent 50%),
        radial-gradient(at 100% 0%, rgba(32, 50, 200, 0.05) 0px, transparent 50%);
    color: #ffffff; 
    -webkit-font-smoothing: antialiased; 
    overflow-x: hidden;
}

/* Custom Scrollbar */
::-webkit-scrollbar { width: 8px; }
::-webkit-scrollbar-track { background: var(--bg); }
::-webkit-scrollbar-thumb { background: #333; border-radius: 10px; }
::-webkit-scrollbar-thumb:hover { background: #444; }

/* Password Overlay */
#passwordOverlay {
    position: fixed; inset: 0; 
    background: radial-gradient(circle at center, #1a1a1a 0%, #000 100%);
    display: flex; flex-direction: column; align-items: center; justify-content: center; 
    z-index: 9999;
    padding: 20px;
}
#passwordOverlay.hidden { display: none; }
#passwordOverlay .logo img { width: 100px; border-radius: 20px; margin-bottom: 24px; filter: drop-shadow(0 0 20px rgba(229,9,20,0.3)); }
#passwordOverlay h2 { margin: 0 0 24px 0; font-size: 22px; font-weight: 600; text-align: center; max-width: 400px; line-height: 1.4; }
#passwordOverlay input {
    padding: 14px 20px; border-radius: 12px; border: 1px solid var(--border);
    background: var(--glass); color: white; font-size: 16px; outline: none;
    width: 100%; max-width: 300px; text-align: center; margin-bottom: 16px;
    backdrop-filter: blur(10px); transition: border 0.3s;
}
#passwordOverlay input:focus { border-color: var(--accent); }
#passwordOverlay button {
    padding: 12px 40px; border-radius: 12px; border: 0; background: var(--accent);
    color: white; font-weight: 700; cursor: pointer; font-size: 16px;
    transition: transform 0.2s, background 0.2s;
}
#passwordOverlay button:hover { background: var(--accent-hover); transform: translateY(-2px); }

/* Intro Overlay */
#introOverlay { position: fixed; inset: 0; background: black; display: flex; align-items: center; justify-content: center; z-index: 9998; }
#introOverlay.hidden { display: none; }
#introOverlay .introLogo { width: 280px; opacity: 0; animation: fadeInOut 2s cubic-bezier(0.4, 0, 0.2, 1) forwards; }
@keyframes fadeInOut { 
    0% { opacity: 0; transform: scale(0.8); filter: blur(10px); }
    50% { opacity: 1; transform: scale(1); filter: blur(0); }
    100% { opacity: 0; transform: scale(1.1); filter: blur(5px); } 
}

/* Layout */
.wrap { max-width: var(--max-width); margin: 0 auto; padding: 40px 20px; display: none; animation: fadeIn 0.8s ease; }
@keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 40px; }
header .left { display: flex; align-items: center; gap: 20px; }
header h1 { font-size: 28px; margin: 0; letter-spacing: -0.5px; }
header p { margin: 4px 0 0; color: var(--muted); font-size: 15px; }
.logo img { width: 60px; height: 60px; border-radius: 14px; object-fit: cover; }

.logout-btn { 
    background: var(--glass); color: #fff; border: 1px solid var(--border); 
    padding: 8px 16px; border-radius: 10px; cursor: pointer; 
    font-size: 13px; font-weight: 600; transition: 0.3s; 
}
.logout-btn:hover { background: rgba(255,255,255,0.1); border-color: rgba(255,255,255,0.2); }

/* Sticky Controls Section */
.sticky-bar {
    position: sticky; top: 10px; z-index: 100;
    background: rgba(11, 11, 13, 0.8);
    backdrop-filter: blur(16px);
    padding: 15px; border-radius: 20px;
    border: 1px solid var(--border);
    margin-bottom: 30px;
}

.controls { display: flex; gap: 12px; flex-wrap: wrap; align-items: center; }
.search { 
    flex: 2; min-width: 250px; display: flex; align-items: center; 
    gap: 10px; background: rgba(0,0,0,0.2); padding: 10px 16px; 
    border-radius: 12px; border: 1px solid var(--border);
}
.search input { background: transparent; border: 0; outline: 0; color: #fff; width: 100%; font-size: 14px; }
.select { 
    background: rgba(0,0,0,0.2); color: #fff; border: 1px solid var(--border); 
    padding: 10px 14px; border-radius: 12px; font-size: 14px; cursor: pointer; outline: none;
}
.select:focus { border-color: var(--accent); }

/* Tabs */
.tabs { display: flex; gap: 8px; margin-bottom: 24px; background: var(--glass); padding: 6px; border-radius: 14px; width: fit-content; margin-left: auto; margin-right: auto; }
.tab-btn { 
    padding: 10px 30px; border: 0; border-radius: 10px; 
    background: transparent; color: var(--muted); 
    font-weight: 600; cursor: pointer; transition: 0.3s; 
}
.tab-btn.active { background: var(--accent); color: white; box-shadow: 0 4px 12px rgba(229, 9, 20, 0.3); }
.tab-btn:hover:not(.active) { color: white; background: rgba(255,255,255,0.05); }

/* Movie Cards */
.movies { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 24px; }
.card { 
    background: var(--card); border-radius: var(--radius); overflow: hidden; 
    border: 1px solid var(--border); display: flex; flex-direction: column; 
    transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); 
}
.card:hover { transform: translateY(-10px) scale(1.02); border-color: rgba(255,255,255,0.2); box-shadow: 0 20px 40px rgba(0,0,0,0.6); }

.poster { position: relative; height: 180px; background: #1a1a1e; overflow: hidden; }
.poster img { width: 100%; height: 100%; object-fit: cover; transition: 0.5s; }
.card:hover .poster img { transform: scale(1.1); }

.meta { padding: 20px; flex-grow: 1; display: flex; flex-direction: column; }
.title-row { display: flex; justify-content: space-between; align-items: flex-start; gap: 10px; margin-bottom: 12px; }
.title { font-size: 17px; font-weight: 700; margin: 0; line-height: 1.2; }
.rating { background: var(--accent); padding: 4px 8px; border-radius: 6px; font-weight: 800; font-size: 11px; color: white; white-space: nowrap; }
.desc { color: var(--muted); font-size: 13.5px; line-height: 1.5; margin-bottom: 20px; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }

.actions { display: flex; gap: 8px; margin-top: auto; }
.btn { flex: 1; padding: 10px; border-radius: 10px; border: 0; cursor: pointer; font-weight: 700; font-size: 13px; transition: 0.2s; }
.btn-watch { background: white; color: black; }
.btn-watch:hover { background: #e0e0e0; }
.btn-info { background: var(--glass); color: white; border: 1px solid var(--border); }
.btn-info:hover { background: rgba(255,255,255,0.1); }

/* Player & Detail Overlays */
#playerOverlay, #showOverlay { 
    position: fixed; inset: 0; background: rgba(0,0,0,0.98); 
    display: none; align-items: center; justify-content: center; 
    z-index: 10000; flex-direction: column; padding: 20px;
}
#playerOverlay iframe { width: 100%; max-width: 1000px; aspect-ratio: 16/9; border: 0; border-radius: 16px; box-shadow: 0 0 50px rgba(229,9,20,0.2); }
#closePlayer, .close-detail { margin-top: 25px; background: var(--accent); color: white; border: 0; padding: 12px 30px; border-radius: 50px; font-weight: 700; cursor: pointer; }

footer { margin-top: 60px; padding: 40px; color: var(--muted); font-size: 14px; text-align: center; border-top: 1px solid var(--border); }

@media(max-width: 768px) {
    header { flex-direction: column; text-align: center; gap: 20px; }
    header .left { flex-direction: column; }
    .sticky-bar { top: 0; border-radius: 0; margin: 0 -20px 30px -20px; }
    .tabs { width: 100%; overflow-x: auto; }
}
</style>
</head>
<body>

<div id="passwordOverlay">
  <div class="logo"><img src="https://i.ibb.co/C3kwF5SC/gtic-logo.png" alt="GTIC Logo"></div>
  <h2>Welcome to GTIC Movie Hub</h2>
  <input type="password" id="pwInput" placeholder="Enter Access Password" />
  <button id="pwBtn">Unlock Hub</button>
</div>

<div id="introOverlay" class="hidden">
  <img src="https://i.ibb.co/C3kwF5SC/gtic-logo.png" class="introLogo" />
</div>

<div class="wrap" id="mainContent">
  <header>
    <div class="left">
      <div class="logo"><img src="https://i.ibb.co/C3kwF5SC/gtic-logo.png" alt="GTIC Logo"></div>
      <div>
        <h1>GTIC Movie Hub</h1>
        <p>Premium streaming for our community.</p>
      </div>
    </div>
    <button id="logoutBtn" class="logout-btn">Sign Out</button>
  </header>

  <div class="sticky-bar">
    <div class="controls">
      <div class="search">
        <span>🔍</span>
        <input id="q" placeholder="Search movies, shows, genres..." />
      </div>
      <select id="filter" class="select">
        <option value="all">All Ratings</option>
        <option value="G">G</option>
        <option value="PG">PG</option>
        <option value="PG-13">PG-13</option>
        <option value="R">R</option>
        <option value="TV-PG">TV-PG</option>
        <option value="TV-MA">TV-MA</option>
      </select>
      <select id="categoryFilter" class="select">
        <option value="all">All Categories</option>
        <option value="Family">Family</option>
        <option value="Christmas">Christmas</option>
        <option value="Halloween">Halloween</option>
        <option value="Action">Action</option>
        <option value="Comedy">Comedy</option>
        <option value="Drama">Drama</option>
        <option value="Crime">Crime</option>
      </select>
      <button id="sortBtn" class="select">Sort A-Z</button>
    </div>
  </div>

  <div class="tabs">
    <button class="tab-btn active" data-tab="movies">Movies</button>
    <button class="tab-btn" data-tab="shows">TV Series</button>
    <button class="tab-btn" data-tab="sports">Live Sports</button>
  </div>

  <main id="movies" class="movies"></main>
  
  <footer>
    <p>&copy; 2026 GTIC Entertainment Hub</p>
    <p style="font-size: 11px; opacity: 0.6; margin-top: 10px;">High-speed streaming. No ads. No tracking.</p>
  </footer>
</div>

<div id="playerOverlay">
  <iframe id="movieFrame" src="" allow="autoplay; encrypted-media; clipboard-write; picture-in-picture" allowfullscreen></iframe>
  <button id="closePlayer">Close Player</button>
</div>

<script>
const correctPassword = "GTICMOVIES6741";
const devPassword = "GTICDEVS89";
const overlay = document.getElementById('passwordOverlay');
const mainContent = document.getElementById('mainContent');
const pwInput = document.getElementById('pwInput');
const pwBtn = document.getElementById('pwBtn');
const logoutBtn = document.getElementById('logoutBtn');
const introOverlay = document.getElementById("introOverlay");

function playIntroThenShowContent() {
  introOverlay.classList.remove("hidden");
  setTimeout(()=>{
      introOverlay.classList.add("hidden"); 
      mainContent.style.display="block";
      initHub();
  },2000);
}

if(localStorage.getItem("gtic_dev_access")==="true"){ 
    overlay.classList.add("hidden"); 
    playIntroThenShowContent(); 
}

pwBtn.addEventListener("click",()=>{ 
    const val=pwInput.value; 
    if(val===correctPassword||val===devPassword){ 
        if(val===devPassword)localStorage.setItem("gtic_dev_access","true"); 
        overlay.classList.add("hidden"); 
        playIntroThenShowContent(); 
    } else{alert("Incorrect password"); pwInput.value="";} 
});

pwInput.addEventListener("keydown", e=>{if(e.key==='Enter') pwBtn.click();});
logoutBtn.addEventListener("click",()=>{ localStorage.removeItem("gtic_dev_access"); location.reload(); });

  { title:"The Parent Trap", rating:"PG", desc:"Twice the Fun, Double the Trouble.", link:"https://vidnest.fun/movie/9820", category:"Family", img:"https://ntvb.tmsimg.com/assets/p21442_v_h10_ab.jpg?w=1280&h=720" },

  { title:"The Curse of Bridge Hollow", rating:"PG-13", desc:"A Halloween adventure where a father and daughter must save their town.", link:"https://gtic-home.short.gy/tpUnyh", category:"Halloween", img:"https://i.ytimg.com/vi/f93J5Bhrf5Q/maxresdefault.jpg" },

  { title:"Superman", rating:"PG-13", desc:"The new chapter in DC’s legacy as Superman rises to inspire hope once again.", link:"https://gtic-home.short.gy/Y3QXuR", category:"Action", img:"https://flixchatter.net/wp-content/uploads/2025/07/gunn-superman-2025.jpg" },

  { title:"M3GAN 2.0", rating:"PG-13", desc:"Sequel with more chaos.", link:"https://gtic-home.short.gy/cHbEJq", category:"Halloween", img:"https://i.ytimg.com/vi/6HInuht789U/maxresdefault.jpg" },
  { title:"M3GAN", rating:"PG-13", desc:"Creepy doll meets comedy.", link:"https://gtic-home.short.gy/7oEn8H", category:"Halloween", img:"https://res.cloudinary.com/jerrick/image/upload/d_642250b563292b35f27461a7.png,f_jpg,fl_progressive,q_auto,w_1024/6402d394a80141001df76adf.jpg" },

  { title:"Five Nights at Freddy's", rating:"PG-13", desc:"Creepy animatronics.", link:"https://gtic-home.short.gy/GOFNw3", category:"Halloween", img:"https://4kwallpapers.com/images/wallpapers/five-nights-at-3840x2160-13263.jpg" },

  { title:"A Charlie Brown Christmas", rating:"G", desc:"Classic comfort movie.", link:"https://drive.google.com/file/d/1e2UIrJdsz_0k5tp2v0EnPZiPv2ZQSTzg/preview", category:"Christmas", img:"https://i.ebayimg.com/images/g/rRoAAOSwfERnGtix/s-l400.jpg" }
];

const shows = [
  { 
    title:"The Last of Us", 
    rating:"TV-MA", 
    desc:"Survivors navigate a post-apocalyptic world.", 
    category:"Drama", 
    img:"https://beam-images.warnermediacdn.com/2025-03/the-last-of-us-s2-og-image.jpg?host=wbd-dotcom-drupal-prd-us-east-1.s3.amazonaws.com",
    seasons:[
      { title:"Season 1", episodes:[
        {title:"Episode 1", link:"https://vidnest.fun/tv/100088/1/1"},
        {title:"Episode 2", link:"https://vidnest.fun/tv/100088/1/2"}
      ]}
    ]
  }
];

const sports = [
  {
    title: "WWE",
    rating: "SPORTS",
    desc: "WWE premium live events",
    img: "https://insidepulse.com/wp-content/uploads/2017/12/WWE-logo-banner.jpg",
    events: [
      { title: "WrestleMania 41", rating: "LIVE", desc: "Biggest WWE event.", img: "https://s.yimg.com/os/en/evening_standard_239/b76fc7a3e8f86308b5564787ce4f5329", link: "https://vidnest.fun/movie/1285198" }
    ]
  }
];

const container = document.getElementById("movies");
const overlayPlayer = document.getElementById("playerOverlay");
const frame = document.getElementById("movieFrame");
const closeBtn = document.getElementById("closePlayer");
let currentTab = "movies";

const showOverlay = document.createElement('div');
showOverlay.id = 'showOverlay';
document.body.appendChild(showOverlay);

function initHub() {
    renderList(movies);
}

function renderList(list){
  container.innerHTML="";
  list.forEach(m=>{
    const card=document.createElement('article'); card.className='card';
    card.innerHTML = `
        <div class="poster"><img src="${m.img}" alt="${m.title}"></div>
        <div class="meta">
            <div class="title-row">
                <h3 class="title">${m.title}</h3>
                <div class="rating">${m.rating}</div>
            </div>
            <p class="desc">${m.desc}</p>
            <div class="actions">
                <button class="btn btn-watch">${m.rating === "COMING SOON" ? "⏳ Coming Soon" : "▶ Watch Now"}</button>
            </div>
        </div>
    `;
    
    if(m.rating !== "COMING SOON") {
        card.querySelector('.btn-watch').onclick = () => {
            if(currentTab === "movies") {
                frame.src = m.link;
                overlayPlayer.style.display = 'flex';
            } else if (currentTab === "shows") {
                openShowDetail(m);
            } else if (currentTab === "sports") {
                openSportCategory(m);
            }
        };
    }
    container.appendChild(card);
  });
}

// Tab Switching
document.querySelectorAll('.tab-btn').forEach(btn => {
    btn.onclick = () => {
        document.querySelector('.tab-btn.active').classList.remove('active');
        btn.classList.add('active');
        currentTab = btn.dataset.tab;
        if(currentTab === "movies") renderList(movies);
        if(currentTab === "shows") renderList(shows);
        if(currentTab === "sports") renderList(sports);
    };
});

closeBtn.onclick = () => { overlayPlayer.style.display = 'none'; frame.src = ""; };

</script>
</body>
</html>
